{% extends "base.html" %}
{% block title %}Search | {{ config.title }}{% endblock title %}
{% block extra_head %}
<link rel="stylesheet" href="{{ get_url(path='pagefind-ui/ui.css') }}">
{% endblock extra_head %}
{% block content %}
{% include "partials/breadcrumb.html" %}
<main id="main-content" class="app-layout page-main">
  <h1>Search</h1>
  <p class="page-desc">Search any article ...</p>
  <div
    id="pagefind-search"
    data-backurl="{% if config.extra.show_back_button %}{{ page.permalink }}{% else %}/{% endif %}"
  ></div>
</main>
{% endblock content %}
{% block scripts %}
<script type="module">
  import { PagefindUI } from "{{ get_url(path='pagefind-ui/ui-core.mjs') }}";

  function initSearch() {
    const pageFindSearch = document.querySelector("#pagefind-search");
    if (!pageFindSearch) return;

    const params = new URLSearchParams(window.location.search);
    const onIdle = window.requestIdleCallback || (cb => setTimeout(cb, 1));

    onIdle(() => {
      const search = new PagefindUI({
        element: "#pagefind-search",
        showImages: false,
        showSubResults: true,
        processTerm(term) {
          params.set("q", term);
          history.replaceState(history.state, "", "?" + params.toString());

          const backUrl = pageFindSearch.dataset.backurl;
          sessionStorage.setItem("backUrl", backUrl + "?" + params.toString());

          return term;
        },
      });

      const query = params.get("q");
      if (query) search.triggerSearch(query);

      const searchInput = document.querySelector(".pagefind-ui__search-input");
      const clearButton = document.querySelector(".pagefind-ui__search-clear");
      searchInput?.addEventListener("input", resetSearchParam);
      clearButton?.addEventListener("click", resetSearchParam);

      function resetSearchParam(e) {
        if (e.target?.value.trim() === "") {
          history.replaceState(history.state, "", window.location.pathname);
        }
      }
    });
  }

  initSearch();
</script>
{% endblock scripts %}
